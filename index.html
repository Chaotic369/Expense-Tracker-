<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monthly Expense Record Book</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a36526">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.75);
            --btn-add: #4ade80;
            --btn-delete: #f87171;
        }

        /* --- THEME 1: PRINCE (Slate Grey-Blue) --- */
        body.theme-prince {
            --bg-color: #3c4250;
            --shadow-dark: #292d37;
            --shadow-light: #4f5769;
            --accent: #cbd5e1; 
            --accent-glow: rgba(203, 213, 225, 0.3);
        }

        /* --- THEME 2: SAURABH (Cerulean Ocean Blue) --- */
        body.theme-saurabh {
            --bg-color: #2070a0;
            --shadow-dark: #175276;
            --shadow-light: #298eca;
            --accent: #bae6fd; 
            --accent-glow: rgba(186, 230, 253, 0.3);
        }

        /* --- THEME 3: CHANDAN (Warm Amber/Copper) --- */
        body.theme-chandan {
            --bg-color: #a36526;
            --shadow-dark: #7a4b1c;
            --shadow-light: #cc7f30;
            --accent: #fef3c7; 
            --accent-glow: rgba(254, 243, 199, 0.3);
        }

        /* --- THEME: DEFAULT (For Newly Added People) --- */
        body[class^="theme-"]:not(.theme-prince):not(.theme-saurabh):not(.theme-chandan) {
            --bg-color: #4b5563;
            --shadow-dark: #374151;
            --shadow-light: #6b7280;
            --accent: #f3f4f6;
            --accent-glow: rgba(243, 244, 246, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            padding: clamp(10px, 3vw, 25px); 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .analyzer-wrapper { width: 100%; margin: 0 auto; max-width: 900px; }

        #sync-status {
            position: fixed; top: 15px; right: 25px; font-size: 13px; font-weight: 600;
            color: var(--text-muted); z-index: 1000; display: flex; align-items: center;
            gap: 8px; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 20px;
        }
        
        #sync-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #facc15; transition: background-color 0.3s; }

        .neu-raised {
            background: var(--bg-color);
            box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
            border-radius: 12px; border: none; transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        .neu-pressed {
            background: var(--bg-color);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            border-radius: 8px; border: none; transition: background-color 0.5s ease, box-shadow 0.5s ease;
        }

        .header-box { text-align: center; padding: 25px; margin-bottom: 30px; }

        .main-title, .sub-title {
            font-weight: 800; letter-spacing: 1px;
            transition: color 0.5s ease, text-shadow 0.5s ease;
            text-shadow: 3px 3px 6px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
        }

        .main-title { font-size: clamp(24px, 5vw, 36px); margin-bottom: 8px; color: var(--accent); }
        .sub-title { font-size: clamp(16px, 3vw, 20px); color: var(--text-muted); font-weight: 600; }

        .tabs-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 15px; margin-bottom: 35px; }

        .tab-btn {
            flex: 1; min-width: 100px; padding: clamp(12px, 2.5vw, 16px); font-weight: 800; font-size: clamp(14px, 3vw, 18px); 
            cursor: pointer; color: var(--text-muted); transition: all 0.4s ease; text-transform: uppercase;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
            border-radius: 10px; background: var(--bg-color); border: none;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        .tab-btn.active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);
        }

        .lock-icon { font-size: 14px; opacity: 0.6; transition: transform 0.2s, opacity 0.2s; padding: 2px; }
        .tab-btn:hover .lock-icon { opacity: 0.9; }
        .lock-icon:hover { transform: scale(1.3); opacity: 1 !important; }
        .lock-icon.is-locked { opacity: 1; }

        .person-card { display: none; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease-in-out; padding: 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .person-header-row { padding: 20px; text-align: center; margin-bottom: 10px; position: relative; }

        .person-name {
            font-size: clamp(22px, 4vw, 28px); font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; margin: 0; color: var(--accent);
            text-shadow: 3px 3px 6px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
            transition: color 0.5s ease;
        }

        .delete-profile-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: transparent; border: none; font-size: 22px; cursor: pointer;
            transition: transform 0.2s; color: var(--btn-delete); opacity: 0.7;
        }
        .delete-profile-btn:hover { transform: translateY(-50%) scale(1.2); opacity: 1; }

        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 12px; table-layout: fixed; }
        .data-table th, .data-table td { padding: 0 8px; text-align: left; border: none; }
        .data-table th:nth-child(1), .data-table td:nth-child(1) { width: 40%; }
        .data-table th:nth-child(2), .data-table td:nth-child(2) { width: 25%; }
        .data-table th:nth-child(3), .data-table td:nth-child(3) { width: 20%; }
        .data-table th:nth-child(4), .data-table td:nth-child(4) { width: 15%; text-align: center; }

        .data-table th { font-weight: 800; font-size: 14px; text-transform: uppercase; color: var(--text-muted); padding-bottom: 5px; }

        .data-table input {
            width: 100%; padding: 12px 15px; outline: none; font-size: 16px; font-weight: 600;
            font-family: 'Poppins', sans-serif; color: var(--text-main); transition: color 0.3s ease; min-width: 0; 
        }
        .data-table input:focus { color: var(--accent); text-shadow: 0 0 5px var(--accent-glow); }

        .action-btns { display: flex; justify-content: center; gap: 10px; align-items: center; height: 100%; }

        .action-btns button {
            background: var(--bg-color); border: none; width: 38px; height: 38px; border-radius: 50%;
            font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: all 0.3s ease; display: flex; align-items: center; justify-content: center;
        }
        .action-btns button:active { box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light); }

        .add-btn { color: var(--btn-add); }
        .delete-btn { color: var(--btn-delete); }

        .total-row td { padding-top: 25px; font-weight: 800; font-size: clamp(20px, 4vw, 24px); }
        .total-label { text-align: right; padding-right: 20px !important; color: var(--text-muted); }
        .total-val { color: var(--accent); text-shadow: 2px 2px 5px var(--shadow-dark), 0 0 10px var(--accent-glow); transition: color 0.5s ease; }
    </style>
</head>
<body class="theme-chandan">

<div id="sync-status">
    <span id="sync-dot"></span>
    <span id="sync-text">Connecting...</span>
</div>

<div class="analyzer-wrapper">
    <div class="header-box neu-raised">
        <div class="main-title">Trip Expenses Tracker</div>
    </div>

    <div class="tabs-container neu-raised" id="tabs-container">
        <!-- Tabs generated by JS -->
        <button class="tab-btn" id="add-person-btn" onclick="addPerson()" style="flex: 0.2; min-width: 60px; background: var(--btn-add); color: #fff; font-size: 24px; padding: 0;">+</button>
    </div>

    <div class="content-container" id="content-container">
        <!-- Profile Cards generated by JS -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAKYJjeh95f6yG973fZj6lkY0WmZ8xuQyM",
      authDomain: "expense-tracker-ad6f1.firebaseapp.com",
      databaseURL: "https://expense-tracker-ad6f1-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "expense-tracker-ad6f1",
      storageBucket: "expense-tracker-ad6f1.firebasestorage.app",
      messagingSenderId: "719841369287",
      appId: "1:719841369287:web:abd9a688ad3495d3eeb2e2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const expensesRef = ref(db, 'expenses/march2026');
    const profilesRef = ref(db, 'profiles/march2026'); // NEW PROFILES NODE

    // --- Core Logic ---
    const syncDot = document.getElementById('sync-dot');
    const syncText = document.getElementById('sync-text');

    // 1. Dynamic Profile State
    window.activeProfiles = JSON.parse(localStorage.getItem('expense_active_profiles')) || [
        { id: 'prince', name: 'Prince' },
        { id: 'saurabh', name: 'Saurabh' },
        { id: 'chandan', name: 'Chandan' }
    ];

    window.updateSyncStatus = function(status) {
        if (status === 'syncing') { syncDot.style.backgroundColor = '#facc15'; syncText.innerText = 'Saving...'; }
        else if (status === 'synced') { syncDot.style.backgroundColor = '#4ade80'; syncText.innerText = 'Cloud Synced'; }
        else if (status === 'error') { syncDot.style.backgroundColor = '#f87171'; syncText.innerText = 'Offline/Error'; }
    }

    function escapeHTML(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    window.createNewRowHTML = function(item = '', qty = '', cost = '') {
        return `
            <td><input type="text" class="neu-pressed" value="${escapeHTML(item)}"></td>
            <td><input type="text" class="qty-input neu-pressed" value="${escapeHTML(qty)}"></td> 
            <td><input type="number" class="cost-input neu-pressed" value="${escapeHTML(cost)}"></td>
            <td><div class="action-btns"><button class="add-btn">＋</button><button class="delete-btn">➖</button></div></td>
        `;
    }

    // 2. DOM Generator for Profiles
    window.generateDOMForProfile = function(id, name) {
        if (document.getElementById(id)) return; // Prevent duplicates

        // Create Tab
        const tabContainer = document.getElementById('tabs-container');
        const addBtn = document.getElementById('add-person-btn');
        const newTab = document.createElement('button');
        newTab.className = 'tab-btn';
        newTab.dataset.target = id;
        newTab.onclick = () => switchTab(id);
        newTab.innerHTML = `${name} <span class="lock-icon" data-id="${id}" onclick="toggleLock(event, '${id}')">🔒</span>`;
        tabContainer.insertBefore(newTab, addBtn);

        // Create Content Card
        const contentContainer = document.getElementById('content-container');
        const newCard = document.createElement('div');
        newCard.id = id;
        newCard.className = 'person-card neu-raised';
        newCard.innerHTML = `
            <div class="person-header-row">
                <h2 class="person-name">${name}'s Expenses</h2>
                <button class="delete-profile-btn" onclick="deleteProfile('${id}')" title="Delete Profile">🗑️</button>
            </div>
            <table class="data-table">
                <tr><th>Item</th><th>Quantity</th><th>Cost</th><th></th></tr>
                <tbody class="table-body"></tbody>
                <tr class="total-row"><td colspan="2" class="total-label">Total:</td><td class="total-val">0.00</td><td></td></tr>
            </table>
        `;
        contentContainer.appendChild(newCard);
    }

    // Render Initial DOM
    window.activeProfiles.forEach(p => generateDOMForProfile(p.id, p.name));

    let saveTimeout;
    window.debounceSave = function() {
        updateSyncStatus('syncing');
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const dataToSave = {};
            window.activeProfiles.forEach(p => {
                dataToSave[p.id] = [];
                document.querySelectorAll(`#${p.id} .item-row`).forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs.length >= 3) {
                        const item = inputs[0].value; const qty = inputs[1].value; const cost = inputs[2].value;
                        if (item.trim() || qty.trim() || cost.trim()) dataToSave[p.id].push({ item, qty, cost });
                    }
                });
            });
            
            // Push to Firebase: Save both the expenses AND the active profiles list
            Promise.all([
                set(expensesRef, dataToSave),
                set(profilesRef, window.activeProfiles)
            ]).then(() => {
                updateSyncStatus('synced');
                localStorage.setItem('expense_tracker_data', JSON.stringify(dataToSave));
            }).catch(error => {
                console.error("Firebase save error:", error);
                updateSyncStatus('error');
            });
        }, 1000); 
    }

    function renderData(data) {
        window.activeProfiles.forEach(p => {
            const tbody = document.querySelector(`#${p.id} .table-body`);
            if (!tbody) return;
            const personData = data ? (data[p.id] || []) : [];
            
            tbody.innerHTML = '';
            if (personData.length > 0) {
                personData.forEach(rowData => {
                    const newRow = document.createElement('tr'); newRow.className = 'item-row';
                    newRow.innerHTML = createNewRowHTML(rowData.item, rowData.qty, rowData.cost); 
                    tbody.appendChild(newRow);
                });
            }
            const blankRow = document.createElement('tr'); blankRow.className = 'item-row';
            blankRow.innerHTML = createNewRowHTML(); tbody.appendChild(blankRow);
        });
        window.calculateTotals();
    }

    // Initialize Data Once on Load
    get(profilesRef).then((profileSnap) => {
        // 1. Sync profiles from the cloud first
        if (profileSnap.exists()) {
            const cloudProfiles = profileSnap.val();
            cloudProfiles.forEach(cloudP => {
                if (!window.activeProfiles.find(p => p.id === cloudP.id)) {
                    window.activeProfiles.push(cloudP);
                    generateDOMForProfile(cloudP.id, cloudP.name);
                }
            });
            localStorage.setItem('expense_active_profiles', JSON.stringify(window.activeProfiles));
        }
        
        // 2. Then fetch the actual expense data
        return get(expensesRef);
    }).then((snapshot) => {
        const data = snapshot.val();
        
        if (snapshot.exists()) {
            renderData(data);
            updateSyncStatus('synced');
        } else {
            const localData = localStorage.getItem('expense_tracker_data');
            renderData(localData ? JSON.parse(localData) : null);
            updateSyncStatus('synced');
        }

        // Initialize Tab System after DOM is built
        const lockedTab = localStorage.getItem('lockedTab');
        const initialTab = lockedTab || window.activeProfiles[0]?.id || 'default';
        if(window.activeProfiles.length > 0) window.switchTab(initialTab);
        updateLockUI(lockedTab);

    }).catch((error) => {
        console.error("Fetch error:", error);
        updateSyncStatus('error');
        const localData = localStorage.getItem('expense_tracker_data');
        renderData(localData ? JSON.parse(localData) : null);
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('Service worker registered.', reg))
                .catch((err) => console.log('Service worker registration failed.', err));
        });
    }
</script>

<script>
    // --- UI Interactions ---
    
    // Feature 1 & 2: Add Person
    window.addPerson = function() {
        const name = prompt("Enter new person's name:");
        if (!name || name.trim() === '') return;
        
        const id = name.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        if (window.activeProfiles.find(p => p.id === id)) {
            alert("This profile already exists!");
            return;
        }

        // Update State
        window.activeProfiles.push({ id, name });
        localStorage.setItem('expense_active_profiles', JSON.stringify(window.activeProfiles));

        // Generate UI & Switch to it
        window.generateDOMForProfile(id, name);
        
        // Add a blank row for the new person
        const tbody = document.querySelector(`#${id} .table-body`);
        const blankRow = document.createElement('tr'); blankRow.className = 'item-row';
        blankRow.innerHTML = window.createNewRowHTML(); tbody.appendChild(blankRow);

        window.switchTab(id);
        window.debounceSave(); // Saves to DB immediately, now including the new profile ID
    };

    // Feature 3: Delete Person
    window.deleteProfile = function(id) {
        if (!confirm("Are you sure you want to completely delete this profile and all its expense data? This is permanent.")) return;

        // Remove from DOM
        document.querySelector(`.tab-btn[data-target="${id}"]`)?.remove();
        document.getElementById(id)?.remove();

        // Remove from State
        window.activeProfiles = window.activeProfiles.filter(p => p.id !== id);
        localStorage.setItem('expense_active_profiles', JSON.stringify(window.activeProfiles));

        // Switch Tab if current was deleted
        if (document.body.classList.contains(`theme-${id}`)) {
            const fallbackTab = window.activeProfiles[0]?.id;
            if (fallbackTab) window.switchTab(fallbackTab);
            else document.body.className = 'theme-default'; // Fallback if 0 profiles exist
        }

        // Update Firebase (The missing key triggers deletion of their node and profile ID)
        window.debounceSave(); 
    };

    window.calculateTotals = function() {
        document.querySelectorAll('.person-card').forEach(card => {
            let total = 0;
            card.querySelectorAll('.item-row').forEach(row => {
                total += parseFloat(row.querySelector('.cost-input').value) || 0;
            });
            const totalEl = card.querySelector('.total-val');
            if(totalEl) totalEl.textContent = total.toFixed(2);
        });
    }

    document.addEventListener('input', (e) => {
        if (e.target.tagName === 'INPUT') window.debounceSave();
        if (e.target.classList.contains('cost-input')) window.calculateTotals();
        
        const row = e.target.closest('.item-row');
        if (row && row === row.parentNode.lastElementChild) {
            let hasVal = false; row.querySelectorAll('input').forEach(i => { if(i.value.trim()) hasVal = true; });
            if (hasVal) {
                const newRow = document.createElement('tr'); newRow.className = 'item-row';
                newRow.innerHTML = window.createNewRowHTML(); row.parentNode.appendChild(newRow);
            }
        }
    });

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-btn')) {
            const row = e.target.closest('.item-row');
            const newRow = document.createElement('tr'); newRow.className = 'item-row';
            newRow.innerHTML = window.createNewRowHTML(); row.parentNode.insertBefore(newRow, row.nextSibling);
            window.debounceSave();
        }
        if (e.target.classList.contains('delete-btn')) {
            const row = e.target.closest('.item-row');
            if (row.parentNode.querySelectorAll('.item-row').length === 1) {
                row.querySelectorAll('input').forEach(i => i.value = '');
            } else { row.remove(); }
            window.calculateTotals(); window.debounceSave();
        }
    });

    window.switchTab = function(personId) {
        if (!document.getElementById(personId)) return;
        document.querySelectorAll('.person-card').forEach(card => card.style.display = 'none');
        document.querySelectorAll('.tab-btn[data-target]').forEach(tab => tab.classList.remove('active'));
        
        document.getElementById(personId).style.display = 'flex';
        const targetBtn = document.querySelector(`.tab-btn[data-target="${personId}"]`);
        if(targetBtn) targetBtn.classList.add('active');
        
        document.body.className = `theme-${personId}`;
    };

    window.toggleLock = function(event, personId) {
        event.stopPropagation();
        const currentlyLocked = localStorage.getItem('lockedTab');
        if (currentlyLocked === personId) {
            localStorage.removeItem('lockedTab');
        } else {
            localStorage.setItem('lockedTab', personId);
        }
        window.updateLockUI(localStorage.getItem('lockedTab'));
    };

    window.updateLockUI = function(lockedPersonId) {
        document.querySelectorAll('.lock-icon').forEach(icon => {
            if (icon.getAttribute('data-id') === lockedPersonId) {
                icon.innerHTML = '🔒'; icon.classList.add('is-locked');
            } else {
                icon.innerHTML = '🔓'; icon.classList.remove('is-locked');
            }
        });
    }
</script>
</body>
</html>
